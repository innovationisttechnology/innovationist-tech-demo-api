name: Deploy Demo API to EC2
run-name: Deploying Demo API ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'main' && 'global' || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy app tests

      - name: Tests (pytest)
        run: uv run pytest

      # Build & push only from main; PRs and feature branches stop after tests.
      - name: Set up Docker Buildx
        if: github.ref_name == 'main'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.ref_name == 'main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: github.ref_name == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:latest
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'

    steps:
      - name: Deploy on EC2 (pull + restart container)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:latest"
            CONTAINER="innovationist-tech-demo-api"

            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true
            docker rmi "$IMAGE" || true

            docker pull "$IMAGE"

            mkdir -p /opt/innovationist-demo-api
            cat > /opt/innovationist-demo-api/.env << EOF
            APP_NAME=${{ secrets.APP_NAME }}
            ENVIRONMENT=production
            PORT=8181
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}
            EOF
            chmod 600 /opt/innovationist-demo-api/.env

            # Bind ONLY to localhost; Nginx proxies to it.
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --env-file /opt/innovationist-demo-api/.env \
              -p 127.0.0.1:8181:8181 \
              "$IMAGE"

            docker image prune -f
