name: Deploy Demo API to EC2
run-name: Deploying Demo API ${{ github.ref_name }} by ${{ github.actor }}

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name == 'main' && 'global' || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy app tests

      - name: Unit tests (pytest)
        run: uv run pytest -m "not integration"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.ref_name == 'main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (push only on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref_name == 'main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:latest
            ${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start MongoDB (replica set)
        run: docker compose up -d mongo

      - name: Wait for MongoDB to be healthy
        run: |
          for i in $(seq 1 40); do
            health=$(docker inspect --format '{{.State.Health.Status}}' innovationist-demo-mongo 2>/dev/null || echo none)
            echo "mongo health: $health"
            [ "$health" = "healthy" ] && exit 0
            sleep 3
          done
          echo "MongoDB did not become healthy in time" >&2
          docker logs innovationist-demo-mongo || true
          exit 1

      - name: Integration tests (pytest)
        env:
          TEST_MONGO_URI: "mongodb://admin:adminpassword@localhost:27018/innovationist_test?authSource=admin&directConnection=true"
        run: uv run pytest -m integration -v

      - name: Stop MongoDB
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref_name == 'main'

    steps:
      - name: Deploy on EC2 (pull + restart container)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKER_USERNAME }}/innovationist-tech-demo-api:latest"
            CONTAINER="innovationist-tech-demo-api"
            # Pre-created on the host with the deploy user owning it:
            #   sudo mkdir -p /opt/innovationist-demo-api
            #   sudo chown "$USER":"$USER" /opt/innovationist-demo-api
            APP_DIR="/opt/innovationist-demo-api"

            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true
            docker rmi "$IMAGE" || true

            docker pull "$IMAGE"

            mkdir -p "$APP_DIR"
            cat > "$APP_DIR/.env" << EOF
            APP_NAME=${{ secrets.APP_NAME }}
            ENVIRONMENT=production
            PORT=8181
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB_NAME=${{ secrets.MONGO_DB_NAME }}
            EOF
            chmod 600 "$APP_DIR/.env"

            # Bind ONLY to localhost; Nginx proxies to it.
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p 127.0.0.1:8181:8181 \
              "$IMAGE"

            docker image prune -f
